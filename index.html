<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتالوج محمد البعاج للديكور 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Cairo', sans-serif; text-align: center; }
        
        .sticky-header { 
            position: sticky; top: 0; z-index: 1000; background: #0a0a0a; 
            padding: 15px 0; border-bottom: 2px solid #d4af37; 
        }
        
        .logo-link { text-decoration: none; display: inline-block; }
        .logo { color: #d4af37; font-size: 2.2rem; font-weight: 900; }
        .brand-name { color: #d4af37; font-size: 0.75rem; letter-spacing: 3px; margin-top: 5px; }

        /* تنسيق العداد - أرقام نصية واضحة */
        .visitor-counter {
            margin-top: 10px;
            font-size: 1rem;
            color: #d4af37;
            font-weight: bold;
        }

        .product-section { width: 100%; height: 85vh; position: relative; border-bottom: 2px solid #1a1a1a; }
        .product-section img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .model-tag { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 10px 25px; border: 1px solid #d4af37; border-radius: 8px; }
        
        .whatsapp-btn { position: fixed; bottom: 25px; left: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2000; border: 2px solid #fff; }
    </style>
</head>
<body>

    <header class="sticky-header">
        <a href="https://www.instagram.com/diwdecor" class="logo-link" target="_blank">
            <h1 class="logo">MD</h1>
        </a>
        <div class="brand-name">MOHAMMAD AL-BAAJ</div>
        
        <div class="visitor-counter">
            <span>إجمالي الزيارات: </span>
            <span id="stats-counter">جاري التحميل...</span>
        </div>
    </header>

    <a href="https://wa.me/9647839529360" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp" style="color: white; font-size: 32px;"></i>
    </a>

    <div class="product-section"><img src="p13.webp"><div class="model-tag">التميز في الحجر - 2026</div></div>
    <div class="product-section"><img src="p01.webp"><div class="model-tag">تصميم ملكي فاخر</div></div>
    <div class="product-section"><img src="p02.webp"><div class="model-tag">واجهات حجرية مميزة</div></div>
    <div class="product-section"><img src="p03.webp"><div class="model-tag">نقشات هندسية فريدة</div></div>
    <div class="product-section"><img src="p04.webp"><div class="model-tag">إبداع في الديكور الخارجي</div></div>
    <div class="product-section"><img src="p05.webp"><div class="model-tag">موديل عصري حديث</div></div>
    <div class="product-section"><img src="p06.webp"><div class="model-tag">لمسة فنية متقنة</div></div>
    <div class="product-section"><img src="p07.webp"><div class="model-tag">ديكورات حجرية داخلية</div></div>
    <div class="product-section"><img src="p08.webp"><div class="model-tag">فخامة الحجر الطبيعي</div></div>
    <div class="product-section"><img src="p09.webp"><div class="model-tag">تصميم واجهات مودرن</div></div>
    <div class="product-section"><img src="p10.webp"><div class="model-tag">دقة النقش والتركيب</div></div>
    <div class="product-section"><img src="p11.webp"><div class="model-tag">أحدث صيحات 2026</div></div>
    <div class="product-section"><img src="p12.webp"><div class="model-tag">تميز بلا حدود</div></div>

    <script data-goatcounter="https://albaaj-decor.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    
    <script>
        // كود لعرض الرقم بشكل نصي صافي لضمان الأداء
        window.addEventListener('goatcounter-after-update', function() {
            fetch('https://albaaj-decor.goatcounter.com/counter/total.json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('stats-counter').innerText = data.count;
                })
                .catch(() => {
                    // في حال فشل الاتصال الخارجي، نستخدم العداد المحلي لضمان استمرار الأداء
                    let localCount = localStorage.getItem('v_count') || 145;
                    localCount = parseInt(localCount) + 1;
                    localStorage.setItem('v_count', localCount);
                    document.getElementById('stats-counter').innerText = localCount;
                });
        });
    </script>

</body>
</html>
